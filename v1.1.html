<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>猫咪监控 · 观看端</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a0a; color:#fff; font-family:-apple-system,sans-serif; min-height:100dvh; display:flex; flex-direction:column; }
#connect-screen { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:32px 24px; }
#app-icon { width:72px; height:72px; border-radius:18px; background:rgba(0,255,136,0.1); border:1px solid rgba(0,255,136,0.22); display:flex; align-items:center; justify-content:center; font-size:36px; margin-bottom:20px; }
#app-title { font-size:22px; font-weight:600; margin-bottom:6px; }
#app-sub { font-size:14px; color:rgba(255,255,255,0.4); margin-bottom:36px; text-align:center; line-height:1.6; }
#input-wrap { width:100%; max-width:340px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1); border-radius:16px; padding:20px; display:flex; flex-direction:column; gap:14px; }
#room-input { background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.14); border-radius:10px; padding:14px 16px; color:#fff; font-size:22px; font-weight:700; letter-spacing:4px; text-align:center; text-transform:uppercase; outline:none; }
#connect-btn { background:#00ff88; color:#000; font-size:16px; font-weight:700; border:none; border-radius:10px; padding:14px; cursor:pointer; }
#connect-status { font-size:13px; color:rgba(255,255,255,0.4); text-align:center; min-height:20px; }
#connect-status.error { color:#ff6b6b; }

#watch-screen { display:none; flex:1; flex-direction:column; background:#000; position:relative; }
#video-wrap { position:relative; flex:1; overflow:hidden; background:#000; }
#remote-video { width:100%; height:100%; object-fit:contain; display:block; background:#000; image-rendering: -webkit-optimize-contrast; }
#watch-hud { position:absolute; top:0; left:0; right:0; display:flex; align-items:center; justify-content:space-between; padding:12px 16px; background:linear-gradient(to bottom,rgba(0,0,0,0.65),transparent); }
#live-dot { width:8px; height:8px; border-radius:50%; background:#ff3b30; animation:blink 1.2s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.15} }
#live-label { font-size:12px; font-weight:700; letter-spacing:1px; color:#ff3b30; margin-left:8px; }
#rec-indicator { display:none; align-items:center; gap:4px; background:rgba(255,59,48,0.2); border:1px solid #ff3b30; color:#ff3b30; padding:2px 8px; border-radius:10px; font-size:10px; font-weight:bold; }

/* 控制栏变为可横向滑动，防止按钮过多挤压 */
#watch-controls { 
  display:flex; align-items:center; justify-content:flex-start; 
  padding:14px 16px; padding-bottom:max(14px,env(safe-area-inset-bottom)); 
  background:rgba(0,0,0,0.9); gap:12px; flex-shrink:0; 
  overflow-x:auto; white-space:nowrap; -webkit-overflow-scrolling:touch;
}
#watch-controls::-webkit-scrollbar { display:none; }
.w-btn { 
  display:flex; flex-direction:column; align-items:center; gap:4px; 
  background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.12); 
  border-radius:12px; padding:10px 14px; color:#fff; font-size:10px; 
  cursor:pointer; flex-shrink:0; min-width:60px;
}
.w-btn.active { background:rgba(0,255,136,0.15); border-color:rgba(0,255,136,0.5); color:#00ff88; }
.w-btn.recording { background:rgba(255,59,48,0.15); border-color:rgba(255,59,48,0.5); color:#ff3b30; }
.w-icon { font-size:20px; line-height:1; }

#dvr-panel { position:absolute; bottom:0; left:0; right:0; top:0; background:rgba(0,0,0,0.95); z-index:100; display:none; flex-direction:column; padding-top:env(safe-area-inset-top); }
#dvr-header { display:flex; justify-content:space-between; align-items:center; padding:16px; border-bottom:1px solid rgba(255,255,255,0.1); }
#dvr-list { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:10px; }
.dvr-item { background:rgba(255,255,255,0.1); border-radius:8px; padding:16px; display:flex; justify-content:space-between; align-items:center; cursor:pointer; }
.dvr-item:active { background:rgba(255,255,255,0.2); }
#dvr-player-wrap { display:none; flex-direction:column; height:100%; background:#000; }
#dvr-video { flex:1; width:100%; }
.dvr-back { padding:16px; text-align:center; background:#1a1a1a; cursor:pointer; font-weight:bold; }
#video-loading { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; pointer-events:none; }
.spinner { width:32px; height:32px; border:2px solid rgba(255,255,255,0.1); border-top-color:#00ff88; border-radius:50%; animation:spin 0.8s linear infinite; }
</style>
</head>
<body>

<div id="connect-screen">
  <div id="app-icon">🐱</div>
  <div id="app-title">猫咪监控</div>
  <div id="input-wrap">
    <input id="room-input" type="text" maxlength="6" placeholder="输入推流端房间码" oninput="this.value=this.value.toUpperCase()">
    <button id="connect-btn" onclick="connectToCamera()">连接</button>
    <div id="connect-status"></div>
  </div>
</div>

<div id="watch-screen">
  <div id="video-wrap">
    <video id="remote-video" playsinline autoplay></video>
    <div id="video-loading"><div class="spinner"></div></div>
    <div id="watch-hud">
      <div style="display:flex;align-items:center">
        <div id="live-dot"></div><div id="live-label">LIVE</div>
        <div id="rec-indicator" style="margin-left:12px;">● 正在录制手机</div>
      </div>
    </div>
  </div>
  
  <div id="watch-controls">
    <button class="w-btn active" id="btn-sound" onclick="toggleSound()"><span class="w-icon">🔊</span>声音</button>
    <button class="w-btn" onclick="switchRemoteCamera()"><span class="w-icon">🔄</span>切镜头</button>
    <button class="w-btn" onclick="takeScreenshot()"><span class="w-icon">📸</span>截图</button>
    <button class="w-btn" id="btn-record" onclick="toggleRecord()"><span class="w-icon">⏺️</span>录屏</button>
    <button class="w-btn" onclick="openDVR()"><span class="w-icon">📜</span>回放</button>
    <button class="w-btn" onclick="toggleFullscreen()"><span class="w-icon">⛶</span>全屏</button>
    <button class="w-btn" onclick="location.reload()"><span class="w-icon">✕</span>断开</button>
  </div>

  <div id="dvr-panel">
    <div id="dvr-list-view" style="display:flex;flex-direction:column;height:100%;">
      <div id="dvr-header">
        <h3 style="font-size:16px;">设备录像回放 (近2小时)</h3>
        <button onclick="closeDVR()" style="background:none;border:none;color:#fff;font-size:24px;">×</button>
      </div>
      <div id="dvr-list"></div>
    </div>
    <div id="dvr-player-wrap">
      <video id="dvr-video" controls playsinline></video>
      <div class="dvr-back" onclick="closeDVRPlayer()">返回列表</div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>
let peer = null, dataConn = null, currentCall = null;
let isRecording = false, mediaRecorder = null, recordedChunks = [];
const remoteVideo = document.getElementById('remote-video');

function connectToCamera() {
  const raw = document.getElementById('room-input').value.trim();
  if (raw.length < 4) return;
  document.getElementById('connect-btn').disabled = true;
  
  peer = new Peer({ host:'0.peerjs.com', port:443, path:'/', secure:true });
  peer.on('open', () => {
    dataConn = peer.connect('catcam-' + raw, { reliable: true });
    dataConn.on('open', () => {
      document.getElementById('connect-screen').style.display = 'none';
      document.getElementById('watch-screen').style.display = 'flex';
    });
    
    dataConn.on('data', (d) => {
      if (d.type === 'LIST_RESULT') renderDVRList(d.data);
      else if (d.type === 'VID_RESULT') playDVRBlob(d.blob);
    });

    peer.on('call', (call) => {
      currentCall = call;
      call.answer();
      call.on('stream', (stream) => {
        remoteVideo.srcObject = stream;
        remoteVideo.play().then(() => {
          document.getElementById('video-loading').style.display = 'none';
        }).catch(()=> {
          document.getElementById('video-loading').innerHTML = '<button onclick="forcePlay()" style="padding:10px;border-radius:8px">点击播放画面</button>';
        });
      });
    });
  });
}

function forcePlay() {
  document.getElementById('video-loading').style.display = 'none';
  remoteVideo.play();
}

function toggleSound() {
  remoteVideo.muted = !remoteVideo.muted;
  document.getElementById('btn-sound').classList.toggle('active', !remoteVideo.muted);
}

function toggleFullscreen() {
  const wrap = document.getElementById('video-wrap');
  if (!document.fullscreenElement) wrap.requestFullscreen?.() || wrap.webkitRequestFullscreen?.();
  else document.exitFullscreen?.() || document.webkitExitFullscreen?.();
}

// === 新增：远端切镜头 ===
function switchRemoteCamera() {
  if (dataConn && dataConn.open) {
    dataConn.send({ cmd: 'SWITCH_CAM' }); // 发送切换指令
    document.getElementById('video-loading').style.display = 'flex';
    document.getElementById('video-loading').innerHTML = '<div class="spinner"></div><p style="margin-top:10px;color:rgba(255,255,255,0.6)">切换镜头中...</p>';
  } else {
    alert("控制通道未连接");
  }
}

// === 新增：截图功能 ===
function takeScreenshot() {
  if (!remoteVideo.videoWidth) return alert("画面未就绪");
  const canvas = document.createElement('canvas');
  canvas.width = remoteVideo.videoWidth;
  canvas.height = remoteVideo.videoHeight;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(remoteVideo, 0, 0, canvas.width, canvas.height);
  
  // 闪屏特效
  const flash = document.createElement('div');
  flash.style.cssText = 'position:absolute;inset:0;background:#fff;z-index:999;transition:opacity 0.5s;pointer-events:none;';
  document.getElementById('video-wrap').appendChild(flash);
  setTimeout(() => flash.style.opacity = '0', 50);
  setTimeout(() => flash.remove(), 550);

  // 下载图片
  const url = canvas.toDataURL('image/jpeg', 0.95);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'CatCam_截图_' + new Date().getTime() + '.jpg';
  a.click();
}

// === 新增：本地录屏功能 ===
function toggleRecord() {
  if (!remoteVideo.srcObject) return alert("画面未就绪");
  
  const btn = document.getElementById('btn-record');
  const indicator = document.getElementById('rec-indicator');
  
  if (!isRecording) {
    recordedChunks = [];
    try {
      // 兼容性处理
      const stream = remoteVideo.srcObject;
      const options = MediaRecorder.isTypeSupported('video/mp4') ? { mimeType: 'video/mp4' } : 
                      MediaRecorder.isTypeSupported('video/webm') ? { mimeType: 'video/webm' } : {};
                      
      mediaRecorder = new MediaRecorder(stream, options);
      mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
      mediaRecorder.onstop = () => {
        const blob = new Blob(recordedChunks, { type: options.mimeType || 'video/mp4' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'CatCam_录屏_' + new Date().getTime() + (options.mimeType === 'video/webm' ? '.webm' : '.mp4');
        a.click();
        URL.revokeObjectURL(url);
      };
      
      mediaRecorder.start();
      isRecording = true;
      btn.classList.add('recording');
      btn.querySelector('.w-icon').textContent = '⏹️';
      indicator.style.display = 'flex';
    } catch (e) {
      alert("当前浏览器不支持网页录屏功能");
    }
  } else {
    mediaRecorder.stop();
    isRecording = false;
    btn.classList.remove('recording');
    btn.querySelector('.w-icon').textContent = '⏺️';
    indicator.style.display = 'none';
  }
}

// --- 回放逻辑 ---
function openDVR() {
  document.getElementById('dvr-panel').style.display = 'flex';
  document.getElementById('dvr-list-view').style.display = 'flex';
  document.getElementById('dvr-player-wrap').style.display = 'none';
  const dvrList = document.getElementById('dvr-list');
  dvrList.innerHTML = '<div style="text-align:center;opacity:0.5;margin-top:20px;">拉取录像中...</div>';
  if (dataConn) dataConn.send({ cmd: 'GET_LIST' });
}
function closeDVR() { document.getElementById('dvr-panel').style.display = 'none'; }
function renderDVRList(list) {
  const dvrList = document.getElementById('dvr-list');
  if (!list || list.length === 0) {
    dvrList.innerHTML = '<div style="text-align:center;opacity:0.5;margin-top:20px;">暂无录像片段，请稍后再试。</div>';
    return;
  }
  list.sort((a,b) => b.id - a.id);
  dvrList.innerHTML = list.map(item => `
    <div class="dvr-item" onclick="requestDVRVideo(${item.id})">
      <span>🕒 ${item.time} (约5分钟)</span><span style="color:#00ff88;">▶ 播放</span>
    </div>
  `).join('');
}
function requestDVRVideo(id) {
  document.getElementById('dvr-list').innerHTML = '<div style="text-align:center;margin-top:20px;"><div class="spinner" style="margin:0 auto 10px;"></div>传输视频缓冲中...</div>';
  if (dataConn) dataConn.send({ cmd: 'GET_VID', id: id });
}
function playDVRBlob(blob) {
  const url = URL.createObjectURL(new Blob([blob]));
  document.getElementById('dvr-list-view').style.display = 'none';
  document.getElementById('dvr-player-wrap').style.display = 'flex';
  const dvrVideo = document.getElementById('dvr-video');
  dvrVideo.src = url; dvrVideo.play();
}
function closeDVRPlayer() {
  const dvrVideo = document.getElementById('dvr-video');
  dvrVideo.pause(); dvrVideo.src = '';
  document.getElementById('dvr-player-wrap').style.display = 'none';
  document.getElementById('dvr-list-view').style.display = 'flex';
  if (dataConn) dataConn.send({ cmd: 'GET_LIST' });
}
</script>
</body>
</html>
